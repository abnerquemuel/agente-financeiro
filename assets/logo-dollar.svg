<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Logo Agente Financeiro</title>
  <desc id="desc">Moeda laranja com cifrao no centro</desc>
  <defs>
    <linearGradient id="ring" x1="82" y1="48" x2="420" y2="462" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffbd41"/>
      <stop offset="0.45" stop-color="#ff8617"/>
      <stop offset="1" stop-color="#f16608"/>
    </linearGradient>
    <linearGradient id="cash" x1="170" y1="78" x2="337" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb132"/>
      <stop offset="0.55" stop-color="#ff941f"/>
      <stop offset="1" stop-color="#dd6508"/>
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="246" fill="#fffdf9" stroke="#070707" stroke-width="10"/>
  <circle cx="256" cy="256" r="221" fill="none" stroke="url(#ring)" stroke-width="35"/>
  <circle cx="256" cy="256" r="196" fill="none" stroke="#070707" stroke-width="8"/>

  <g paint-order="stroke fill" stroke="#070707" stroke-linejoin="round" stroke-linecap="round">
    <text x="256" y="388"
      text-anchor="middle"
      font-family="Arial Black, Impact, sans-serif"
      font-size="350"
      font-weight="900"
      fill="url(#cash)"
      stroke-width="13">$</text>
  </g>

  <path d="M80 132C149 54 276 26 382 83" fill="none" stroke="#ffe7b4" stroke-width="12" stroke-linecap="round" opacity="0.78"/>
  <path d="M382 78c31 17 56 41 74 73" fill="none" stroke="#fff5d8" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <path d="M78 358c52 82 167 122 275 88" fill="none" stroke="#a63b02" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
</svg>
